openapi: 3.0.0
info:
  title: API Port de plaisance
  version: 1.0.0
  description: Documentation de l'API de gestion des catways et réservations

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /catways:
    get:
      summary: Liste tous les catways
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Créer un catway
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                catwayNumber:
                  type: number
                catwayType:
                  type: string
                  enum: [long, short]
                catwayState:
                  type: string
      responses:
        '201':
          description: Créé

  /catways/{id}:
    get:
      summary: Détail d'un catway
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Modifier l'état d'un catway
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                catwayState:
                  type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Supprimer un catway
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /catways/{id}/reservations:
    get:
      summary: Liste les réservations d'un catway
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Créer une réservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                clientName:
                  type: string
                boatName:
                  type: string
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
      responses:
        '201':
          description: Créé

  /catways/{id}/reservations/{idReservation}:
    get:
      summary: Détail d'une réservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: idReservation
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Modifier une réservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: idReservation
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Supprimer une réservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: idReservation
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /users:
    get:
      summary: Liste tous les utilisateurs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
    post:
      summary: Créer un utilisateur
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: Créé

  /users/{email}:
    get:
      summary: Détail d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    put:
      summary: Modifier un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
    delete:
      summary: Supprimer un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /login:
    post:
      summary: Connexion
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: OK

  /logout:
    get:
      summary: Déconnexion
      responses:
        '302':
          description: Redirigé vers la page d'accueil